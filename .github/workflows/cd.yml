name: CD

on:
  push:
    branches: [main]

env:
  AWS_REGION:     us-east-1
  ECR_REGISTRY:   979126074847.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: finly-backend
  EC2_IP:         34.203.56.201
  EC2_USER:       ec2-user

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::979126074847:role/finly-github-actions
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push to ECR
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to EC2 via SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/finly.pem
          chmod 600 /tmp/finly.pem
          ssh -o StrictHostKeyChecking=no -i /tmp/finly.pem $EC2_USER@$EC2_IP << 'ENDSSH'
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS --password-stdin 979126074847.dkr.ecr.us-east-1.amazonaws.com
            cd /opt/finly
            docker compose pull finly-backend
            docker compose up -d --no-deps finly-backend
          ENDSSH
          rm -f /tmp/finly.pem
